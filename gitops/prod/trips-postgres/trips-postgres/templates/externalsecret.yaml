---
# Source: trips-postgres/templates/externalsecret.yaml
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: trips-postgres-secret
  namespace: trip-manager-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-store
    kind: ClusterSecretStore
  target:
    name: trips-postgres-secret
  data:
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: trips-database-password
