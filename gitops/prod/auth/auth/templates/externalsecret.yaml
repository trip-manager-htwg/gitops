---
# Source: auth/templates/externalsecret.yaml
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: auth-secrets
  namespace: trip-manager-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-store
    kind: ClusterSecretStore
  target:
    name: auth-secrets
  data:
    - secretKey: FIREBASE_PROJECT_ID
      remoteRef:
        key: auth-firebase-project-id
