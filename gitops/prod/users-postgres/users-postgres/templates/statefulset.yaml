---
# Source: users-postgres/templates/statefulset.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: users-postgres
  namespace: trip-manager-prod
spec:
  serviceName: users-postgres
  replicas: 1
  selector:
    matchLabels:
      app: users-postgres
  template:
    metadata:
      labels:
        app: users-postgres
    spec:
      containers:
        - name: users-postgres
          image: "postgres:16-alpine"
          args: ["-c", "hba_file=/etc/postgresql/pg_hba.conf"]
          env:
            - name: POSTGRES_DB
              value: users
            - name: POSTGRES_USER
              value: users
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: users-postgres-secret
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: config
              mountPath: /etc/postgresql
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: postgres
      volumes:
        - name: config
          configMap:
            name: users-postgres-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: premium-rwo
        resources:
          requests:
            storage: 8Gi
