---
# Source: users/templates/externalsecret.yaml
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: users-secrets
  namespace: trip-manager-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-store
    kind: ClusterSecretStore
  target:
    name: users-secrets
  data:
    - secretKey: MIGRATION_DB_URL
      remoteRef:
        key: users-migration-url
    - secretKey: DATABASE_URL
      remoteRef:
        key: users-database-url
    - secretKey: APP_DB_PASSWORD
      remoteRef:
        key: users-app-database-password
    - secretKey: RESEND_API_KEY
      remoteRef:
        key: resend-api-key
    - secretKey: GITHUB_TOKEN
      remoteRef:
        key: github-token
    - secretKey: INTERNAL_SECRET
      remoteRef:
        key: internal-secret
