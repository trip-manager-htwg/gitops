---
# Source: trips/templates/externalsecrets.yaml
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: trips-secrets
  namespace: trip-manager-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-store
    kind: ClusterSecretStore
  target:
    name: trips-secrets
  data:
    - secretKey: MIGRATION_DB_URL
      remoteRef:
        key: trips-migration-url
    - secretKey: DATABASE_URL
      remoteRef:
        key: trips-database-url
    - secretKey: APP_DB_PASSWORD
      remoteRef:
        key: trips-app-database-password
    - secretKey: INTERNAL_SECRET
      remoteRef:
        key: internal-secret
