---
# Source: feed/templates/externalsecrets.yaml
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: feed-secrets
  namespace: trip-manager-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-store
    kind: ClusterSecretStore
  target:
    name: feed-secrets
  data:
    - secretKey: NEO4J_URI
      remoteRef:
        key: neo4j-url
    - secretKey: NEO4J_USERNAME
      remoteRef:
        key: neo4j-username
    - secretKey: NEO4J_PASSWORD
      remoteRef:
        key: neo4j-password
