---
# Source: auth/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: trip-manager-prod
  labels:
    app.kubernetes.io/name: auth
    app.kubernetes.io/instance: auth
    app.kubernetes.io/version: "sha-d90b2a6ad17c714fd268254b309ba6318e4a6a1d"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: trip-manager
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: auth
      app.kubernetes.io/instance: auth
  template:
    metadata:
      labels: 
        app.kubernetes.io/name: auth
        app.kubernetes.io/instance: auth
      annotations:
        checksum/config: 14fb2b2599848ec45537cd170dfd1a144a894287d34d5bb266f81e402bd637b7
    spec:
      imagePullSecrets: 
        - name: ghcr-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: auth
          image: "ghcr.io/trip-manager-htwg/backend/auth:sha-d90b2a6ad17c714fd268254b309ba6318e4a6a1d"
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
              name: http
              protocol: TCP
          env: 
            - name: PORT
              value: "8082"
            - name: LOG_LEVEL
              value: info
            - name: CORS_ALLOWED_ORIGINS
              value: https://www.neatnode.xyz,https://neatnode.xyz
            - name: OTEL_COLLECTOR_ENDPOINT
              value: otel-collector.trip-manager-prod.svc.cluster.local:4317
          envFrom: 
            - secretRef:
                name: auth-secrets
          resources: 
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
      serviceAccountName: auth
