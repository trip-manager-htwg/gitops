apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: trip-manager-prod
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/instance: frontend
    app.kubernetes.io/version: "sha-a0519ce51dd53783fc96f441210d9691f75ca530"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: trip-manager
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
      app.kubernetes.io/instance: frontend
  template:
    metadata:
      labels: 
        app.kubernetes.io/name: frontend
        app.kubernetes.io/instance: frontend
      annotations:
