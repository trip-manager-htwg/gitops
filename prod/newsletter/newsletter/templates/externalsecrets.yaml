---
# Source: newsletter/templates/externalsecrets.yaml
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: newsletter-secrets
  namespace: trip-manager-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-store
    kind: ClusterSecretStore
  target:
    name: newsletter-secrets
  data:
    - secretKey: MIGRATION_DB_URL
      remoteRef:
        key: newsletter-migration-url
    - secretKey: DATABASE_URL
      remoteRef:
        key: newsletter-database-url
    - secretKey: APP_DB_PASSWORD
      remoteRef:
        key: newsletter-app-database-password
    - secretKey: USERS_DB_URL
      remoteRef:
        key: users-database-url
    - secretKey: NEO4J_URI
      remoteRef:
        key: neo4j-url
    - secretKey: NEO4J_USERNAME
      remoteRef:
        key: neo4j-username
    - secretKey: NEO4J_PASSWORD
      remoteRef:
        key: neo4j-password
    - secretKey: RESEND_API_KEY
      remoteRef:
        key: resend-api-key
